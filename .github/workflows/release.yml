name: Release

# Push a tag like `v0.3.1` (driven by `make release BUMP=patch|minor|major`).
# Two parallel Mac builds (Apple Silicon on macos-14, Intel on macos-13),
# both ad-hoc codesigned and ed25519-signed for the updater. The release
# job stitches both arches into one GitHub Release; downstream jobs bump:
#   * simion/homebrew-termic     (Casks/termic.rb gets version + BOTH shas)
#   * simion/termic.dev          (public/updates/latest.json gets BOTH platforms)
#
# Brew users see the new version on `brew upgrade --cask`; running
# Termic instances on either arch see the in-app updater pill within
# ~5 min (CF Pages cache TTL on the manifest).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write           # needed to create the GitHub Release

env:
  # Hard-coded so PRs from forks can't override.
  TAP_REPO: simion/homebrew-termic
  WEBSITE_REPO: simion/termic.dev
  WEBSITE_MANIFEST_PATH: public/updates/latest.json

jobs:
  # Cheap fast-fail: type-check the frontend on Ubuntu (~1 min) before
  # spinning up the ~5-min Mac runners on both arches. Catches the
  # broken-import / bad-prop class of errors that bit v0.1.1, without
  # paying for either Mac runner. Cargo errors get caught later by
  # `tauri build` in build-* since cross-compiling the Rust side from
  # Linux needs the macOS SDK; not worth the setup.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc -b

  # ─── Apple Silicon (arm64) ─────────────────────────────────────────
  # ─── Universal macOS build (arm64 + x86_64 fused) ─────────────────
  # Single job on macos-14 (arm runner): installs both rust targets,
  # passes --target universal-apple-darwin to tauri, which builds
  # both arches in-house and lipo's them into one fat Mach-O. Output
  # is a single Termic_<v>_universal.dmg + Termic.app.tar.gz that
  # runs natively on both arch families. macOS auto-selects the
  # right slice at exec time.
  #
  # Why this instead of two separate jobs:
  #   - No dependency on macos-13 (Intel) runners which were queue-
  #     stuck routinely on the free tier.
  #   - One artifact to publish + one sha in the cask + one updater
  #     URL (the tauri-plugin-updater dispatches on the running
  #     arch's platform key, but both keys point at the same .tar.gz
  #     since macOS unpacks the slice it needs).
  #   - ~2x build time on a single runner vs. parallel, but much less
  #     than waiting for an Intel runner to come available.
  build-mac:
    needs: validate
    runs-on: macos-14
    outputs:
      version:   ${{ steps.meta.outputs.version }}
      dmg_name:  ${{ steps.meta.outputs.dmg_name }}
      dmg_sha:   ${{ steps.hashes.outputs.dmg_sha }}
      sig:       ${{ steps.hashes.outputs.sig }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version + filenames
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Tauri's universal target produces `<productName>_<v>_universal.dmg`
          # in src-tauri/target/universal-apple-darwin/release/bundle/dmg/
          # APFS hides case mismatches locally; GitHub Releases URLs are
          # case-SENSITIVE so the cask MUST reference exactly this casing.
          echo "dmg_name=Termic_${VERSION}_universal.dmg" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
        with:
          # BOTH targets needed for the universal build - tauri-cli
          # invokes cargo twice (once per arch) then lipo's the output.
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - name: Cache Rust target dir
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-universal-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - name: Build & sign (universal)
        env:
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: '-'
        run: npm run tauri build -- --target universal-apple-darwin
      - name: Compute SHA256 + read .sig
        id: hashes
        run: |
          BUNDLE_DIR=src-tauri/target/universal-apple-darwin/release/bundle
          DMG="$BUNDLE_DIR/dmg/${{ steps.meta.outputs.dmg_name }}"
          ls -la "$DMG"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "dmg_sha=$SHA" >> "$GITHUB_OUTPUT"
          SIG=$(cat "$BUNDLE_DIR/macos/Termic.app.tar.gz.sig")
          { echo 'sig<<EOF'; echo "$SIG"; echo 'EOF'; } >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: termic-${{ steps.meta.outputs.version }}-universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/Termic.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/Termic.app.tar.gz.sig

  # ─── Stitch the universal build into a Release ────────────────────
  release:
    needs: build-mac
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: termic-${{ needs.build-mac.outputs.version }}-universal
          path: mac
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-mac.outputs.version }}
        run: |
          # Notes body is the first thing direct-download users see.
          # The recommended brew path goes first because it sidesteps
          # quarantine; the xattr command is the escape hatch for
          # non-brew users.
          NOTES=$(cat <<EOF
          ## Install

          **Universal macOS binary** — runs natively on Apple Silicon (M1+) and Intel.

          **Recommended — Homebrew** (handles Gatekeeper for you):

          \`\`\`sh
          brew install --cask simion/termic/termic
          \`\`\`

          **Direct .dmg** — download \`Termic_${VERSION}_universal.dmg\` below,
          drag to /Applications, then strip the quarantine flag so macOS
          Gatekeeper lets it launch (you'd otherwise see _"Termic can't be
          opened because Apple cannot check it for malicious software"_):

          \`\`\`sh
          xattr -dr com.apple.quarantine /Applications/Termic.app
          \`\`\`

          ## Updates

          The app self-updates: future releases land via the in-app **Update** pill
          (top-right of the toolbar). For Homebrew installs, \`brew upgrade --cask\` also works.

          ## Changelog

          See the [v${VERSION} tag](https://github.com/${{ github.repository }}/tree/v${VERSION})
          for the commits in this release.
          EOF
          )
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --notes "$NOTES" \
            mac/dmg/*.dmg mac/macos/*

  # ─── Bump the Homebrew cask ────────────────────────────────────────
  bump-tap:
    needs: [build-mac, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Bump cask (version + universal sha256)
        run: |
          cd tap
          VERSION="${{ needs.build-mac.outputs.version }}"
          SHA="${{ needs.build-mac.outputs.dmg_sha }}"
          # The universal cask has a single top-level `sha256` with
          # the `# @sha-arm` anchor (kept named that way for sed
          # backwards compat; the binary itself is now arm+intel
          # fused). One DMG, one sha, no per-arch split needed.
          #
          # We rewrite the whole `sha256 "…" # @sha-arm` line in one
          # shot — keeps the anchor pinned to the value line even if
          # it ever drifts (a prior breakage that landed an empty
          # `sha256 ""` in the tap and broke integrity verification
          # for end users; brew silently falls back to :no_check).
          # The match deliberately accepts empty quotes too.
          sed -i.bak -E "s|^  version \".*\"|  version \"$VERSION\"|" Casks/termic.rb
          sed -i.bak -E "s|^  sha256 \"[^\"]*\".*$|  sha256 \"$SHA\" # @sha-arm|" Casks/termic.rb
          rm Casks/termic.rb.bak

          # Fail-fast: if the sha line isn't exactly what we expect
          # (right sha + anchor present), abort rather than push a
          # broken tap that disables checksum verification silently.
          if ! grep -qE "^  sha256 \"${SHA}\" # @sha-arm\$" Casks/termic.rb; then
            echo "✗ Cask sha256 line did not update as expected. Aborting."
            grep -n 'sha256' Casks/termic.rb || true
            exit 1
          fi
          git config user.name  "termic-bot"
          git config user.email "termic-bot@users.noreply.github.com"
          git add Casks/termic.rb
          git commit -m "termic $VERSION"
          git push

  # ─── Bump the updater manifest (both arches, one universal URL) ────
  bump-website:
    needs: [build-mac, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.WEBSITE_REPO }}
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: site
      - name: Write update manifest
        run: |
          cd site
          VERSION="${{ needs.build-mac.outputs.version }}"
          SIG=$(cat <<'EOF'
          ${{ needs.build-mac.outputs.sig }}
          EOF
          )
          # tauri-plugin-updater dispatches on the platform key matching
          # the running app's arch. With a universal binary both arches
          # point at the SAME .app.tar.gz — macOS extracts the matching
          # slice at install. Need both entries so neither arch gets
          # stranded on an older version.
          BASE="https://github.com/${{ github.repository }}/releases/download/v$VERSION"
          cat > "${{ env.WEBSITE_MANIFEST_PATH }}" <<JSON
          {
            "version": "$VERSION",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/v$VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIG",
                "url": "$BASE/Termic.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "$SIG",
                "url": "$BASE/Termic.app.tar.gz"
              }
            }
          }
          JSON
          git config user.name  "termic-bot"
          git config user.email "termic-bot@users.noreply.github.com"
          git add "${{ env.WEBSITE_MANIFEST_PATH }}"
          git commit -m "updater: bump to $VERSION"
          git push
