name: Release

# Push a tag like `v0.3.1` (driven by `make release BUMP=patch|minor|major`).
# Parallel platform builds (Mac universal on macos-26, Linux AppImage on
# ubuntu-latest), both ed25519-signed for the in-app updater. The release
# job stitches everything into one GitHub Release; downstream jobs bump:
#   * simion/homebrew-termic     (Casks/termic.rb gets version + mac sha)
#   * simion/termic.dev          (public/updates/{latest,changelog}.json)
#
# Brew + AppImage users see the new version automatically; running
# Termic instances on either platform see the in-app updater pill
# within ~5 min (CF Pages cache TTL on the manifest).
#
# Linux scope: AppImage only. `.deb` / `.rpm` are skipped intentionally
# because the Tauri updater can't replace package-manager-owned files,
# so shipping them would split users into "self-update works" vs
# "doesn't" buckets with no in-app signal.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write           # needed to create the GitHub Release

env:
  # Hard-coded so PRs from forks can't override.
  TAP_REPO: simion/homebrew-termic
  WEBSITE_REPO: simion/termic.dev
  WEBSITE_MANIFEST_PATH: public/updates/latest.json
  WEBSITE_CHANGELOG_PATH: public/updates/changelog.json

jobs:
  # Cheap fast-fail: type-check the frontend on Ubuntu (~1 min) before
  # spinning up the ~5-min Mac runners on both arches. Catches the
  # broken-import / bad-prop class of errors that bit v0.1.1, without
  # paying for either Mac runner. Cargo errors get caught later by
  # `tauri build` in build-* since cross-compiling the Rust side from
  # Linux needs the macOS SDK; not worth the setup.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc -b

  # ─── Apple Silicon (arm64) ─────────────────────────────────────────
  # ─── Universal macOS build (arm64 + x86_64 fused) ─────────────────
  # Single job on macos-26 (arm runner): installs both rust targets,
  # passes --target universal-apple-darwin to tauri, which builds
  # both arches in-house and lipo's them into one fat Mach-O. Output
  # is a single Termic_<v>_universal.dmg + Termic.app.tar.gz that
  # runs natively on both arch families. macOS auto-selects the
  # right slice at exec time.
  #
  # MUST be macos-26 (Tahoe), not macos-14: the window-control (traffic
  # light) layout follows the SDK the binary was LINKED against. An older
  # runner links a pre-Tahoe SDK, so macOS renders the release in
  # compatibility mode (smaller, pre-Tahoe-positioned traffic lights) on a
  # Tahoe machine, misaligned vs. a locally-built dev binary linked against
  # the Tahoe SDK. Building on macos-26 links the Tahoe SDK → native chrome
  # that matches local. minimumSystemVersion (tauri.conf.json) stays 12.0,
  # so backward compat is unaffected. See tauri-apps/tauri#14477.
  #
  # Why universal-in-one-job instead of two:
  #   - No dependency on macos-13 (Intel) runners which were queue-
  #     stuck routinely on the free tier.
  #   - One artifact to publish + one sha in the cask + one updater
  #     URL (the tauri-plugin-updater dispatches on the running
  #     arch's platform key, but both keys point at the same .tar.gz
  #     since macOS unpacks the slice it needs).
  #   - ~2x build time on a single runner vs. parallel, but much less
  #     than waiting for an Intel runner to come available.
  build-mac:
    needs: validate
    runs-on: macos-26
    outputs:
      version:   ${{ steps.meta.outputs.version }}
      dmg_name:  ${{ steps.meta.outputs.dmg_name }}
      dmg_sha:   ${{ steps.hashes.outputs.dmg_sha }}
      sig:       ${{ steps.hashes.outputs.sig }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version + filenames
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Tauri's universal target produces `<productName>_<v>_universal.dmg`
          # in src-tauri/target/universal-apple-darwin/release/bundle/dmg/
          # APFS hides case mismatches locally; GitHub Releases URLs are
          # case-SENSITIVE so the cask MUST reference exactly this casing.
          echo "dmg_name=Termic_${VERSION}_universal.dmg" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
        with:
          # BOTH targets needed for the universal build - tauri-cli
          # invokes cargo twice (once per arch) then lipo's the output.
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - name: Cache Rust target dir
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-universal-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - name: Configure Apple signing & notarization
        # Three constraints shape this step:
        #   1. `secrets` is not allowed in step `if:` expressions - the
        #      whole workflow fails to parse (killed v0.10.10's first run
        #      at 0s). Gate in the shell instead.
        #   2. tauri treats SET-BUT-EMPTY APPLE_* env vars as "sign with
        #      this", so the build step must not see them at all until the
        #      secrets exist. Forward each var via GITHUB_ENV only when
        #      configured; fall back to ad-hoc signing ('-') meanwhile.
        #   3. `env.HOME` does not exist in workflow expressions - export
        #      the API-key PATH from the shell, where $HOME is real.
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY:              ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER:           ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_CONTENT:      ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          addenv() { printf '%s<<__TERMIC_EOF__\n%s\n__TERMIC_EOF__\n' "$1" "$2" >> "$GITHUB_ENV"; }
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "Apple certificate configured; Developer ID signing."
            addenv APPLE_CERTIFICATE          "$APPLE_CERTIFICATE"
            addenv APPLE_CERTIFICATE_PASSWORD "$APPLE_CERTIFICATE_PASSWORD"
            addenv APPLE_SIGNING_IDENTITY     "${APPLE_SIGNING_IDENTITY:--}"
          else
            echo "No Apple certificate secret; ad-hoc signing ('-')."
            addenv APPLE_SIGNING_IDENTITY "-"
          fi
          if [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_KEY_CONTENT" ]; then
            echo "App Store Connect key configured; notarization on."
            mkdir -p ~/.appstoreconnect/private_keys
            printf '%s' "$APPLE_API_KEY_CONTENT" > ~/.appstoreconnect/private_keys/AuthKey_"$APPLE_API_KEY".p8
            addenv APPLE_API_KEY      "$APPLE_API_KEY"
            addenv APPLE_API_ISSUER   "$APPLE_API_ISSUER"
            addenv APPLE_API_KEY_PATH "$HOME/.appstoreconnect/private_keys/AuthKey_$APPLE_API_KEY.p8"
          else
            echo "No App Store Connect key; skipping notarization."
          fi
      - name: Build, sign & notarize (universal)
        env:
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --target universal-apple-darwin
      - name: Compute SHA256 + read .sig
        id: hashes
        run: |
          BUNDLE_DIR=src-tauri/target/universal-apple-darwin/release/bundle
          DMG="$BUNDLE_DIR/dmg/${{ steps.meta.outputs.dmg_name }}"
          ls -la "$DMG"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "dmg_sha=$SHA" >> "$GITHUB_OUTPUT"
          SIG=$(cat "$BUNDLE_DIR/macos/Termic.app.tar.gz.sig")
          { echo 'sig<<EOF'; echo "$SIG"; echo 'EOF'; } >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: termic-${{ steps.meta.outputs.version }}-universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/Termic.app.tar.gz
            src-tauri/target/universal-apple-darwin/release/bundle/macos/Termic.app.tar.gz.sig

  # ─── Linux x86_64 AppImage ────────────────────────────────────────
  # Single artifact: a signed AppImage. We skip .deb / .rpm on purpose
  # (Tauri's updater can't replace package-manager-owned files, so
  # shipping them would silently break self-update for those users).
  # AppImage is the only format the updater can drop in place.
  #
  # ubuntu-latest tracks 24.04 which ships WebKitGTK 4.1 — Tauri 2's
  # required version. If GitHub bumps the alias before 4.1 lands, pin
  # to ubuntu-24.04 explicitly.
  build-linux:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      version:        ${{ steps.meta.outputs.version }}
      appimage_name:  ${{ steps.find.outputs.appimage_name }}
      appimage_sha:   ${{ steps.hashes.outputs.appimage_sha }}
      sig:            ${{ steps.hashes.outputs.sig }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: System dependencies
        # The WebKitGTK 4.1 + GTK3 + AppIndicator3 + librsvg2 quartet
        # is exactly what tauri-runtime-wry links against. libsoup-3
        # is required by the new webkit2gtk-4.1 (the 4.0 line used
        # libsoup-2). libxdo-dev is for tauri's auto-typer plugin.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl wget file git pkg-config \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev libsoup-3.0-dev libxdo-dev
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Cache Rust target dir
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
      - run: npm ci
      - name: Build & sign (AppImage)
        # --bundles appimage skips .deb / .rpm so we don't spend build
        # time on artifacts we won't publish. The .AppImage.sig file
        # is produced automatically alongside it because
        # `createUpdaterArtifacts: true` is set in tauri.conf.json
        # and the signing env vars are present.
        env:
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles appimage
      - name: Repair AppImage root symlinks + re-sign
        # tauri-bundler writes the AppDir's root symlinks (.DirIcon and
        # Termic.desktop) with ABSOLUTE targets, so the runner's
        # /home/runner/... paths get baked into the squashfs
        # (tauri-apps/tauri#15110, no merged fix as of cli 2.11). On
        # user machines those links dangle: Gear Lever/AppImageLauncher
        # abort integration with "Symlink target not found" and the
        # desktop/dock icon never resolves (.DirIcon is what every
        # integration tool reads). Until upstream merges a fix: unpack,
        # relink relative, repack with appimagetool, and re-sign (the
        # repack invalidates the .sig `tauri build` just produced; the
        # later "Compute SHA256 + read .sig" step picks up the new one).
        env:
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          BUNDLE_DIR=src-tauri/target/release/bundle/appimage

          # Static appimagetool; --appimage-extract-and-run avoids the
          # FUSE requirement on GitHub runners.
          curl -fsSL -o /tmp/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool

          cd "$BUNDLE_DIR"
          NAME=$(basename "$(ls ./*.AppImage | head -n1)")
          "./$NAME" --appimage-extract >/dev/null   # → squashfs-root/

          # Rewrite every absolute symlink that points inside the build
          # AppDir to a relative one. Anything absolute pointing OUTSIDE
          # the AppDir is already broken today; warn so it shows in logs.
          find squashfs-root -type l | while IFS= read -r link; do
            tgt=$(readlink "$link")
            case "$tgt" in /*) ;; *) continue ;; esac
            inner="${tgt#*.AppDir/}"
            if [ "$inner" = "$tgt" ]; then
              echo "::warning::absolute symlink escapes the AppDir: $link -> $tgt"
              continue
            fi
            rel=$(realpath -m --relative-to="$(dirname "$link")" "squashfs-root/$inner")
            echo "relink: $link -> $rel (was $tgt)"
            ln -sfn "$rel" "$link"
          done

          rm -f "$NAME"
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run -n squashfs-root "$NAME"
          rm -rf squashfs-root

          cd "$GITHUB_WORKSPACE"
          npx tauri signer sign "$BUNDLE_DIR/$NAME"   # rewrites $NAME.sig
      - name: Locate AppImage
        # Tauri lowercases productName for the AppImage filename. The
        # exact form (`termic_<v>_amd64.AppImage`) has held across
        # Tauri 2 releases but we glob defensively so a future rename
        # doesn't break the upload + manifest.
        id: find
        run: |
          BUNDLE_DIR=src-tauri/target/release/bundle/appimage
          ls -la "$BUNDLE_DIR"
          APPIMAGE=$(ls "$BUNDLE_DIR"/*.AppImage | head -n1)
          NAME=$(basename "$APPIMAGE")
          echo "appimage_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "appimage_path=$APPIMAGE" >> "$GITHUB_ENV"
      - name: Compute SHA256 + read .sig
        id: hashes
        run: |
          SHA=$(sha256sum "$appimage_path" | awk '{print $1}')
          echo "appimage_sha=$SHA" >> "$GITHUB_OUTPUT"
          SIG=$(cat "${appimage_path}.sig")
          { echo 'sig<<EOF'; echo "$SIG"; echo 'EOF'; } >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: termic-${{ steps.meta.outputs.version }}-linux-x86_64
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig

  # ─── Stitch the universal build into a Release ────────────────────
  release:
    needs: [build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: termic-${{ needs.build-mac.outputs.version }}-universal
          path: mac
      - uses: actions/download-artifact@v4
        with:
          name: termic-${{ needs.build-linux.outputs.version }}-linux-x86_64
          path: linux
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-mac.outputs.version }}
          LINUX_APPIMAGE: ${{ needs.build-linux.outputs.appimage_name }}
        run: |
          # Notes body is the first thing direct-download users see.
          # The recommended brew path goes first because it sidesteps
          # quarantine; the xattr command is the escape hatch for
          # non-brew users. Linux gets its own block with the
          # AppImage one-liner (chmod + run; no installer step).
          NOTES=$(cat <<EOF
          ## Install

          ### macOS (universal — Apple Silicon + Intel)

          **Recommended — Homebrew** (handles Gatekeeper for you):

          \`\`\`sh
          brew install --cask simion/termic/termic
          \`\`\`

          **Direct .dmg** — download \`Termic_${VERSION}_universal.dmg\` below,
          drag to /Applications, then strip the quarantine flag so macOS
          Gatekeeper lets it launch (you'd otherwise see _"Termic can't be
          opened because Apple cannot check it for malicious software"_):

          \`\`\`sh
          xattr -dr com.apple.quarantine /Applications/Termic.app
          \`\`\`

          ### Linux (x86_64 AppImage)

          Download \`${LINUX_APPIMAGE}\` below, mark executable, run:

          \`\`\`sh
          chmod +x ${LINUX_APPIMAGE}
          ./${LINUX_APPIMAGE}
          \`\`\`

          The sandbox feature is macOS-only on Linux: the workspace's
          Shield toggle is disabled and agents run unsandboxed.
          Everything else (worktrees, parallel tabs, find-in-files,
          themes, in-app diff) works the same.

          ## Updates

          The app self-updates on both platforms: future releases land via the
          in-app **Update** pill (top-right of the toolbar). For Homebrew installs,
          \`brew upgrade --cask\` also works. For Linux AppImage installs, the
          updater replaces the file in place — keep it somewhere writable
          (\`~/Applications\` works well).

          ## Changelog

          See the [v${VERSION} tag](https://github.com/${{ github.repository }}/tree/v${VERSION})
          for the commits in this release.
          EOF
          )
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --notes "$NOTES" \
            mac/dmg/*.dmg mac/macos/* \
            linux/*.AppImage linux/*.AppImage.sig

  # ─── Bump the Homebrew cask ────────────────────────────────────────
  bump-tap:
    needs: [build-mac, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - name: Bump cask (version + universal sha256)
        run: |
          cd tap
          VERSION="${{ needs.build-mac.outputs.version }}"
          SHA="${{ needs.build-mac.outputs.dmg_sha }}"
          # The universal cask has a single top-level `sha256` with
          # the `# @sha-arm` anchor (kept named that way for sed
          # backwards compat; the binary itself is now arm+intel
          # fused). One DMG, one sha, no per-arch split needed.
          #
          # We rewrite the whole `sha256 "…" # @sha-arm` line in one
          # shot — keeps the anchor pinned to the value line even if
          # it ever drifts (a prior breakage that landed an empty
          # `sha256 ""` in the tap and broke integrity verification
          # for end users; brew silently falls back to :no_check).
          # The match deliberately accepts empty quotes too.
          sed -i.bak -E "s|^  version \".*\"|  version \"$VERSION\"|" Casks/termic.rb
          sed -i.bak -E "s|^  sha256 \"[^\"]*\".*$|  sha256 \"$SHA\" # @sha-arm|" Casks/termic.rb
          rm Casks/termic.rb.bak

          # Fail-fast: if the sha line isn't exactly what we expect
          # (right sha + anchor present), abort rather than push a
          # broken tap that disables checksum verification silently.
          if ! grep -qE "^  sha256 \"${SHA}\" # @sha-arm\$" Casks/termic.rb; then
            echo "✗ Cask sha256 line did not update as expected. Aborting."
            grep -n 'sha256' Casks/termic.rb || true
            exit 1
          fi
          git config user.name  "termic-bot"
          git config user.email "termic-bot@users.noreply.github.com"
          git add Casks/termic.rb
          git commit -m "termic $VERSION"
          git push

  # ─── Bump the updater manifest + changelog ─────────────────────────
  # Two files land in the termic.dev repo:
  #   * latest.json    — Tauri updater manifest (Rust-side, signed).
  #   * changelog.json — what the in-app Update card + Changelog dialog
  #                      render. Source of truth is changelog.json in
  #                      THIS repo (authored by scripts/release.sh); it's
  #                      copied over verbatim.
  bump-website:
    needs: [build-mac, build-linux, release]
    runs-on: ubuntu-latest
    steps:
      # The termic.dev repo — where both files get committed.
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.WEBSITE_REPO }}
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: site
      # This repo at the pushed tag — for changelog.json.
      - uses: actions/checkout@v4
        with:
          path: app
      - name: Write update manifest + changelog
        env:
          MAC_SIG:   ${{ needs.build-mac.outputs.sig }}
          LINUX_SIG: ${{ needs.build-linux.outputs.sig }}
          LINUX_APPIMAGE: ${{ needs.build-linux.outputs.appimage_name }}
        run: |
          cd site
          VERSION="${{ needs.build-mac.outputs.version }}"
          # tauri-plugin-updater dispatches on the platform key matching
          # the running app's arch. With a universal mac binary both
          # arches point at the SAME .app.tar.gz — macOS extracts the
          # matching slice at install. Linux gets one x86_64 AppImage
          # (no aarch64 yet — add `linux-aarch64` once we have an ARM
          # Linux runner). Each platform's signature is its OWN ed25519
          # signature, not shared with mac.
          BASE="https://github.com/${{ github.repository }}/releases/download/v$VERSION"
          cat > "${{ env.WEBSITE_MANIFEST_PATH }}" <<JSON
          {
            "version": "$VERSION",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/v$VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$MAC_SIG",
                "url": "$BASE/Termic.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "$MAC_SIG",
                "url": "$BASE/Termic.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "$LINUX_SIG",
                "url": "$BASE/$LINUX_APPIMAGE"
              }
            }
          }
          JSON
          # changelog.json is copied verbatim — the termic repo is its
          # single source of truth (authored by scripts/release.sh).
          cp ../app/changelog.json "${{ env.WEBSITE_CHANGELOG_PATH }}"
          git config user.name  "termic-bot"
          git config user.email "termic-bot@users.noreply.github.com"
          git add "${{ env.WEBSITE_MANIFEST_PATH }}" "${{ env.WEBSITE_CHANGELOG_PATH }}"
          git commit -m "updater: bump to $VERSION + changelog"
          git push
