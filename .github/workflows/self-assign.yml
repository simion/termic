name: Self-assign

# Lets anyone claim an issue by commenting "/assign" (and step back with
# "/unassign"). There is no repo permission setting for this: only
# collaborators are assignable by default, and user-owned repos have no
# triage role. GitHub does allow assigning anyone who has commented on
# the issue, so the /assign comment itself makes the commenter assignable.

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  self-assign:
    # Issues only (issue_comment also fires on PR comments). The loose
    # startsWith here is narrowed to an exact command match in the script.
    if: ${{ !github.event.issue.pull_request && startsWith(github.event.comment.body, '/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body.trim();
            if (!/^\/(un)?assign$/.test(body)) return;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;
            const user = context.payload.comment.user.login;
            if (body === '/assign') {
              await github.rest.issues.addAssignees({ owner, repo, issue_number, assignees: [user] });
            } else {
              await github.rest.issues.removeAssignees({ owner, repo, issue_number, assignees: [user] });
            }
            // Acknowledge with a reaction instead of a bot comment.
            await github.rest.reactions.createForIssueComment({
              owner, repo,
              comment_id: context.payload.comment.id,
              content: '+1',
            });
