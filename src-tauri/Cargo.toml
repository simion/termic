[package]
name = "termic"
version = "0.1.0"
description = "Parallel-agent orchestrator with embedded terminals"
authors = ["simion"]
edition = "2021"

[lib]
name = "termic_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-notification = "2"
tauri-plugin-dialog = "2"
tauri-plugin-window-state = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "5"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
portable-pty = "0.8"
parking_lot = "0.12"
libc = "0.2"
# font-kit enumerates installed system fonts and exposes is_monospace().
# Lazy-evaluated: only the `list_monospace_fonts` command pulls families.
font-kit = "0.14"
# Ghostty's VT100 parser + state machine compiled to a native dylib (via
# build.rs running `zig build`). We feed PTY output through it, then ask
# for an xterm.js-compatible serialization to rehydrate the screen
# whenever a frontend (re)attaches. Same forks the kanna app uses; their
# pinned commits are battle-tested and the serializer is a thin shim on
# top of libghostty's render API. Requires `zig` in PATH at build time.
libghostty-vt = { git = "https://github.com/jemdiggity/libghostty-rs.git", rev = "61ae57d7b42821e1b19ad325abc7ff49c80fc880", package = "libghostty-vt" }
ghostty-xterm-compat-serialize = { git = "https://github.com/jemdiggity/ghostty-xterm-compat-serialize.git", rev = "135f988f408de703d5c4f6ae45de6902f3403f7c" }
