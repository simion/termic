[package]
name = "termic"
version = "0.3.9"
description = "Run claude, gemini, and codex in parallel — each in its own git worktree."
authors = ["Simion Agavriloaei"]
edition = "2021"
license = "AGPL-3.0-or-later"
repository = "https://github.com/simion/termic"
homepage = "https://termic.dev"
readme = "../README.md"
publish = false

[lib]
name = "termic_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-notification = "2"
tauri-plugin-dialog = "2"
tauri-plugin-window-state = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dirs = "5"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
portable-pty = "0.8"
parking_lot = "0.12"
libc = "0.2"
# font-kit enumerates installed system fonts and exposes is_monospace().
# Lazy-evaluated: only the `list_monospace_fonts` command pulls families.
font-kit = "0.14"
tauri-plugin-updater = "2.10.1"
tauri-plugin-process = "2.3.1"
regex = "1.12.3"

[dev-dependencies]
tempfile = "3"
